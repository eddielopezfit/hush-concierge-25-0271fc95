# Dependabot — weekly dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Phoenix"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      # Batch low-risk minor/patch bumps into a single PR
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # Group the React ecosystem so versions stay aligned
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Group Radix UI primitives (many small packages)
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Group testing stack
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
    ignore:
      # Supabase types are codegen-managed by Lovable Cloud — don't auto-bump
      - dependency-name: "@supabase/supabase-js"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Phoenix"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
