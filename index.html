    <style>
      html,body{background:#0d0d0d;color:#f5f3ee;margin:0;}
      /* Branded cold-load shell — visible instantly without JS so guests
         never see a blank black screen while the React bundle parses. */
      #hush-shell{
        position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:#0d0d0d;color:#f5f3ee;z-index:9999;
        font-family:'Playfair Display', Georgia, 'Times New Roman', serif;
        transition:opacity .6s ease;opacity:1;
      }
      #hush-shell .hush-mark{
        font-size:64px;line-height:1;letter-spacing:-0.02em;font-weight:600;
        background:linear-gradient(135deg,#d8b063,#a87f3a);
        -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
        margin-bottom:14px;
      }
      #hush-shell .hush-name{
        font-family:'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(245,243,238,.55);
        margin-bottom:28px;
      }
      #hush-shell .hush-msg{
        font-family:'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size:13px;color:rgba(245,243,238,.45);letter-spacing:.04em;
      }
      #hush-shell .hush-bar{
        margin-top:22px;width:120px;height:1px;background:rgba(216,176,99,.18);overflow:hidden;border-radius:1px;
      }
      #hush-shell .hush-bar::after{
        content:"";display:block;width:40%;height:100%;
        background:linear-gradient(90deg,transparent,#d8b063,transparent);
        animation:hushSlide 1.4s ease-in-out infinite;
      }
      @keyframes hushSlide{
        0%{transform:translateX(-120%);}100%{transform:translateX(360%);}
      }
      #hush-shell.is-hidden{opacity:0;pointer-events:none;}
    </style>
